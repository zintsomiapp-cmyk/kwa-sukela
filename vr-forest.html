<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Dr Sasa's Story Forest Quest</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:black; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: Arial;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="ui">Dr Sasa Forest Loading...</div>

<script>
let scene, camera, renderer;

init();
animate();

function init(){
  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x000000, 10, 60);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0,2,5);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // ground
  const geo = new THREE.PlaneGeometry(100,100);
  const mat = new THREE.MeshBasicMaterial({color:0x0a2a18});
  const ground = new THREE.Mesh(geo, mat);
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // simple light (fire placeholder)
  const light = new THREE.PointLight(0xffaa33, 2, 50);
  light.position.set(0,3,0);
  scene.add(light);

  // cube “dr sasa placeholder”
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshBasicMaterial({color:0x884422})
  );
  box.position.set(0,1,0);
  scene.add(box);

  window.addEventListener('resize', onResize);
}

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
</script>

</body>
</html>
